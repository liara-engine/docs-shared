<!--
    Liara Engine — Shared Navbar

    This is a static HTML fragment to be embedded in every documentation
    page (Doxygen, mdBook, the central hub). It is not a component
    rendered by JS; the markup is here in full so that the page renders
    correctly even before scripts execute.

    Required external files (link tags should appear in the consuming
    page's <head>):

        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap">
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/opendyslexic@1.0.4/opendyslexic-regular.css">
        <link rel="stylesheet" href="<DOCS_SHARED_BASE>/tokens/design-tokens.css">
        <link rel="stylesheet" href="<DOCS_SHARED_BASE>/navbar/navbar.css">
        <script defer src="<DOCS_SHARED_BASE>/navbar/navbar.js"></script>

    Where <DOCS_SHARED_BASE> is the deployed location of the
    docs-shared assets, e.g. "https://liara-engine.github.io/docs-shared".
-->

<nav id="liara-navbar" class="liara-navbar" aria-label="Documentation navigation">
    <div class="liara-navbar__inner">

        <!-- Brand: logo + project name. Always links back to the hub. -->
        <a class="liara-navbar__brand" href="https://liara-engine.github.io/" aria-label="Liara Engine home">
            <svg class="liara-navbar__logo" width="22" height="22" viewBox="0 0 24 24" aria-hidden="true">
                <circle cx="12" cy="12" r="10" fill="var(--liara-brand-primary)"/>
                <circle cx="12" cy="12" r="4" fill="var(--liara-brand-primary-dark)"/>
            </svg>
            <span class="liara-navbar__brand-name">Liara Engine</span>
        </a>

        <!-- Module navigation. Highlighted item is set by navbar.js based on URL. -->
        <ul class="liara-navbar__modules" role="list">
            <li><a class="liara-navbar__module" data-liara-module="user" href="https://liara-engine.github.io/user/dev/">User guide</a></li>
            <li><a class="liara-navbar__module" data-liara-module="interfaces" href="https://liara-engine.github.io/liara-interfaces/dev/">Interfaces</a></li>
            <li><a class="liara-navbar__module" data-liara-module="core" href="https://liara-engine.github.io/liara-core/dev/">Core</a></li>
            <li><a class="liara-navbar__module" data-liara-module="renderer" href="https://liara-engine.github.io/liara-renderer/dev/">Renderer</a></li>
        </ul>

        <!-- Pushes the actions to the right edge -->
        <div class="liara-navbar__spacer"></div>

        <!-- Version selector. Populated by navbar.js from version.json. -->
        <div class="liara-navbar__version">
            <button class="liara-navbar__version-trigger" type="button"
                    aria-haspopup="listbox" aria-expanded="false"
                    aria-label="Switch documentation version">
                <span class="liara-navbar__version-label" data-liara-version-label>dev</span>
                <svg class="liara-navbar__version-caret" width="10" height="10" viewBox="0 0 10 10" aria-hidden="true">
                    <path d="M2 4l3 3 3-3" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <ul class="liara-navbar__version-menu" role="listbox" data-liara-version-menu hidden></ul>
        </div>

        <!-- Action buttons: theme, a11y, GitHub -->
        <div class="liara-navbar__actions">

            <!-- Theme cycle: system -> light -> dark -> system. The icon shown
                 reflects the *current* theme; clicking advances to the next. -->
            <button class="liara-navbar__action" type="button"
                    data-liara-theme-toggle
                    aria-label="Toggle color theme"
                    title="Toggle color theme">
                <svg class="liara-navbar__icon liara-navbar__icon--system" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                    <rect x="3" y="5" width="18" height="13" rx="2" stroke="currentColor" stroke-width="1.6" fill="none"/>
                    <path d="M8 21h8M12 18v3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
                <svg class="liara-navbar__icon liara-navbar__icon--light" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                    <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="1.6" fill="none"/>
                    <path d="M12 3v2M12 19v2M3 12h2M19 12h2M5.6 5.6l1.4 1.4M17 17l1.4 1.4M5.6 18.4l1.4-1.4M17 7l1.4-1.4" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
                </svg>
                <svg class="liara-navbar__icon liara-navbar__icon--dark" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round"/>
                </svg>
            </button>

            <!-- Dyslexia-friendly mode toggle. Independent of theme. -->
            <button class="liara-navbar__action liara-navbar__action--text" type="button"
                    data-liara-a11y-toggle
                    aria-label="Toggle dyslexia-friendly mode"
                    aria-pressed="false"
                    title="Dyslexia-friendly mode">
                <span aria-hidden="true">Aa</span>
            </button>

            <!-- GitHub link. The repo it points to is set by navbar.js based
                 on the module currently being viewed (or the meta repo by
                 default). -->
            <a class="liara-navbar__action" data-liara-github
               href="https://github.com/liara-engine/liara"
               aria-label="View on GitHub" title="View on GitHub" target="_blank" rel="noopener">
                <svg class="liara-navbar__icon" width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                    <path fill="currentColor" d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5.5.09.66-.22.66-.48v-1.7c-2.78.6-3.37-1.34-3.37-1.34-.45-1.16-1.11-1.47-1.11-1.47-.91-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.89 1.53 2.34 1.09 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.94 0-1.09.39-1.98 1.03-2.68-.1-.25-.45-1.27.1-2.65 0 0 .84-.27 2.75 1.02a9.5 9.5 0 0 1 5 0c1.91-1.29 2.75-1.02 2.75-1.02.55 1.38.2 2.4.1 2.65.64.7 1.03 1.59 1.03 2.68 0 3.84-2.34 4.69-4.57 4.94.36.31.68.92.68 1.85V21c0 .27.16.58.67.48A10 10 0 0 0 22 12 10 10 0 0 0 12 2z"/>
                </svg>
            </a>

        </div>

        <!-- Mobile menu toggle. Visible only on small screens via CSS. -->
        <button class="liara-navbar__menu-toggle" type="button"
                data-liara-menu-toggle
                aria-label="Open menu" aria-expanded="false">
            <span class="liara-navbar__menu-toggle-bar"></span>
            <span class="liara-navbar__menu-toggle-bar"></span>
            <span class="liara-navbar__menu-toggle-bar"></span>
        </button>

    </div>
</nav>
